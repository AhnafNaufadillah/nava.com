<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Pegunungan</title>
    <link rel="stylesheet" href="stile.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Umum dan Penengahan */
        body {
            margin: 0;
            padding: 0;
            /* Menghapus min-height pada body karena akan ditangani oleh wrapper */
            padding-bottom: 50px;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        /* BACKGROUND BARU + Perbaikan Pemusatan Vertikal */
        .page-content-wrapper {
            width: 100%;
            /* Menggunakan 100vh untuk mengisi seluruh tinggi layar agar pemusatan bekerja */
            min-height: 100vh; 
            display: flex;
            /* Mengubah properti untuk menumpuk konten secara vertikal */
            flex-direction: column; 
            align-items: center;
            /* Properti utama untuk memusatkan konten secara vertikal */
            justify-content: center; 

            /* Background gambar + overlay */
            background:
                linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)),
                url("gunungkembar.jpg");

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            box-sizing: border-box;
            
            /* Menambahkan padding agar konten tidak tertutup Navbar dan Footer */
            padding-top: 60px; /* Ruang untuk Navbar */
            padding-bottom: 60px; /* Ruang untuk Footer */
        }
        
        /* CSS BARU UNTUK JUDUL EXPERIENCE */
        .page-content-wrapper h1 {
            color: white;
            font-size: 3rem; /* Ukuran font yang besar */
            font-weight: 600;
            margin-bottom: 20px; /* Jarak antara judul dan slider */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7); /* Efek bayangan agar lebih jelas */
            text-transform: uppercase; /* Membuat huruf kapital semua */
        }
        
        /* CSS untuk Carousel / Slider */
        .slider-container {
            position: relative;
            max-width: 800px;
            width: 90%;
            overflow: hidden;
            border-radius: 1rem;
        }
        
        .kodfun-galeri {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }
        
        .kodfun-galeri > div {
            min-width: 100%;
            height: 400px;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            box-sizing: border-box;
        }

        /* Tombol Navigasi */
        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            padding: 16px;
            margin-top: -22px;
            color: white;
            font-weight: bold;
            font-size: 24px;
            transition: 0.6s ease;
            user-select: none;
            background-color: rgba(0,0,0,0.5);
            z-index: 10;
        }

        .next { right: 0; }

        .prev:hover, .next:hover {
            background-color: rgba(0,0,0,0.8);
        }
        
        /* Navbar Dibuat Fixed agar tidak mengganggu pemusatan vertikal */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 30; 
            /* Contoh Background-color - sesuaikan dengan stile.css Anda */
            background-color: #386641; 
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 10px;
            background-color: #333; 
            color: white;
            width: 100%;
            /* Penting: Pertahankan Fixed Position */
            position: fixed;
            bottom: 0;
            z-index: 20;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="#" class="logo">⛰️ Paduk Mountain</a>
        <ul class="nav-links">
            <li><a href="index.html">Beranda</a></li>
            <li><a href="DaftarPegunungan.html">Daftar Pegunungan</a></li>
            <li><a href="Perlengkapan.html" target="_blank">Perlengkapan</a></li>
            <li><a href="https://wa.me/6283124398466">Kontak</a></li>
        </ul>
        <button class="menu-toggle" aria-label="Toggle navigation">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>
    </nav>

    <div class="page-content-wrapper">
        <h1>EXPERIENCE</h1>
        
        <div class="slider-container">
            
            <div class="kodfun-galeri" id="image-slider">
                <div class="slide" style="background-image: url(kodfun-galeri/kf11.jpg);"></div>
                <div class="slide" style="background-image: url(kodfun-galeri/kf12.jpg);"></div>
                <div class="slide" style="background-image: url(kodfun-galeri/kf1.jpg);"></div>
                <div class="slide" style="background-image: url(kodfun-galeri/kf9.jpg);"></div>
                <div class="slide" style="background-image: url(kodfun-galeri/kf2.jpg);"></div>
                <div class="slide" style="background-image: url(kodfun-galeri/kf3.jpg);"></div>
                <div class="slide" style="background-image: url(kodfun-galeri/kf7.jpg);"></div>
                <div class="slide" style="background-image: url(kodfun-galeri/kf8.jpg);"></div>
                <div class="slide" style="background-image: url(kodfun-galeri/kf4.jpg);"></div>
                <div class="slide" style="background-image: url(kodfun-galeri/kf10.jpg);"></div>
                <div class="slide" style="background-image: url(kodfun-galeri/kf5.jpg);"></div>
                <div class="slide" style="background-image: url(kodfun-galeri/kf6.jpg);"></div>
            </div>   
            
            <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
            <a class="next" onclick="plusSlides(1)">&#10095;</a>
            
        </div>
    </div> 
    
    <footer class="footer">
        &copy; 2025 Hak Cipta Ahnaf
    </footer>

    <script>
        let slideIndex = 0;
        const slider = document.getElementById('image-slider');
        const slides = document.querySelectorAll('.kodfun-galeri > div');
        const totalSlides = slides.length;

        function showSlides() {
            if (slideIndex >= totalSlides) {
                slideIndex = 0;
            } 
            if (slideIndex < 0) {
                slideIndex = totalSlides - 1;
            }
            
            const offset = -slideIndex * 100;
            slider.style.transform = `translateX(${offset}%)`;
        }
        
        function plusSlides(n) {
            slideIndex += n;
            showSlides();
        }
        
        showSlides(); 
    </script>
</body>
</html>
