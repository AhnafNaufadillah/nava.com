<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="serius4.css">
</head>
<body>
    <div class="container">
    <div class="heading">LOGIN DULU WAK!</div>
    <form id="loginForm" class="form" action="DaftarPegunungan.html">
        <div class="input-field">
            <input id="username" type="text" required>
            <label for="Username">Username</label>
        </div>
            <div class="input-field">
            <input type="email" required autocomplete="on">
            <label for="Email">Email</label>
        </div>
            <div class="input-field">
            <input id="password" type="password" required autocomplete="on">
            <label for="password">Password</label>
        </div>
        <div class="btn-container">
            <button class="btn">Submit</button> 
        </div>
    </form>
<script src="script2.js"></script>
</body>
</html>
